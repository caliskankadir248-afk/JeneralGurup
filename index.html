<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeneral Gurup</title>

<style>
  body {
    margin:0;
    font-family: Arial;
    background:#111;
    color:white;
  }

  header {
    background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd') center/cover;
    height:260px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
    font-weight:bold;
    text-shadow:2px 2px 6px black;
  }

  .container {
    max-width:900px;
    margin:auto;
    padding:20px;
  }

  .card {
    background:#1e1e1e;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
  }

  input, textarea {
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
  }

  button {
    margin-top:10px;
    padding:10px 15px;
    background:#00ffcc;
    border:none;
    cursor:pointer;
    font-weight:bold;
    border-radius:6px;
  }

  button:hover {
    background:#00c9a5;
  }

  .ticket {
    background:#2a2a2a;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
  }
</style>
</head>

<body>

<header>JENERAL GURUP 🏗️</header>

<div class="container">

  <div class="card">
    <h2>🔧 Znajdź fachowca</h2>
    <p>Dodaj zlecenie, a fachowcy skontaktują się z Tobą.</p>
  </div>

  <div class="card">
    <h2>🧾 Utwórz ticket</h2>

    <input id="title" placeholder="Tytuł pracy">
    <textarea id="desc" placeholder="Opis pracy"></textarea>
    <button onclick="addTicket()">Dodaj</button>

  </div>

  <div class="card">
    <h2>📌 Lista zleceń</h2>
    <div id="list"></div>
  </div>

</div>

<script>
function addTicket() {
  let title = document.getElementById("title").value;
  let desc = document.getElementById("desc").value;

  if(title === "" || desc === "") {
    alert("Uzupełnij pola!");
    return;
  }

  let div = document.createElement("div");
  div.className = "ticket";
  div.innerHTML = "<b>" + title + "</b><br>" + desc + "<br><small>👷 Fachowcy mogą się zgłaszać</small>";

  document.getElementById("list").appendChild(div);

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";
}
</script>

</body>
</html>
