<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeneral Gurup</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd') center/cover;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  font-weight:bold;
  text-shadow:2px 2px 8px black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:10px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#1e1e1e;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card .info{
  padding:10px;
  font-size:14px;
}

.tag{
  display:inline-block;
  padding:3px 6px;
  background:#00ffcc;
  color:black;
  font-size:11px;
  border-radius:5px;
  margin-top:5px;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:10px;
}
</style>
</head>

<body>

<header>JENERAL GURUP 🏗️</header>

<div class="container">
  <h2>🔨 Projeler</h2>
</div>

<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758">
    <div class="info">
      Modern Daire
      <div class="tag">Boya</div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <div class="info">
      Villa Projesi
      <div class="tag">Fayans</div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427">
    <div class="info">
      Ofis Binası
      <div class="tag">Elektrik</div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
    <div class="info">
      Dış Cephe
      <div class="tag">Boya</div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501183638710-841dd1904471">
    <div class="info">
      Mutfak Tadilat
      <div class="tag">Fayans</div>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1560185008-b033106af5c3">
    <div class="info">
      Elektrik Sistemleri
      <div class="tag">Elektrik</div>
    </div>
  </div>

</div>

</body>
</html>
