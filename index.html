<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeneral Gurup</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header{
  background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd') center/cover;
  height:260px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:bold;
  text-shadow:2px 2px 8px black;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:12px;
  padding:20px;
  max-width:1000px;
  margin:auto;
}

.card{
  background:#1e1e1e;
  border-radius:10px;
  overflow:hidden;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.info{
  padding:10px;
}

.tag{
  display:inline-block;
  margin-top:5px;
  padding:3px 6px;
  font-size:11px;
  background:#00ffcc;
  color:black;
  border-radius:5px;
}

/* CONTACT */
.contact{
  text-align:center;
  padding:30px;
  background:#111;
  margin-top:40px;
}

.buttons a{
  display:inline-block;
  margin:5px;
  padding:10px 15px;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

.phone{background:#00ffcc;color:black}
.wa{background:#25D366;color:white}
.tw{background:#1DA1F2;color:white}
.ig{background:#E1306C;color:white}

/* MAP */
.map{
  max-width:900px;
  margin:20px auto;
}
</style>
</head>

<body>

<header>JENERAL GURUP 🏗️</header>

<!-- PROJELER -->
<div class="grid">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758">
    <div class="info">Modern Daire <div class="tag">Boya</div></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <div class="info">Villa <div class="tag">Fayans</div></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427">
    <div class="info">Ofis <div class="tag">Elektrik</div></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1503387762-592deb58ef4e">
    <div class="info">Dış Cephe <div class="tag">Boya</div></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1501183638710-841dd1904471">
    <div class="info">Mutfak <div class="tag">Fayans</div></div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1560185008-b033106af5c3">
    <div class="info">Elektrik Sistem <div class="tag">Elektrik</div></div>
  </div>

</div>

<!-- MAP -->
<div class="map">
  <iframe
    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d243647.499036!2d28.9784!3d41.0082"
    width="100%" height="250" style="border:0;">
  </iframe>
</div>

<!-- CONTACT -->
<div class="contact">

  <h2>📞 İletişim</h2>

  <div class="buttons">

    <a class="phone" href="tel:+905551112233">📱 Telefon</a>
    <a class="wa" href="https://wa.me/905551112233">💬 WhatsApp</a>
    <a class="tw" href="https://twitter.com/">🐦 Twitter</a>
    <a class="ig" href="https://instagram.com/">📸 Instagram</a>

  </div>

  <p style="color:#aaa;margin-top:10px;">
    Jeneral Gurup – İnşaat & Proje Hizmetleri
  </p>

</div>

</body>
</html>
