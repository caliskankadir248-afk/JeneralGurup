<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeneral Gurup</title>

<style>
body {margin:0;font-family:Arial;background:#0f0f0f;color:white}

/* HEADER */
header {
  background:url('https://images.unsplash.com/photo-1504307651254-35680f356dfd') center/cover;
  height:280px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:bold;
  text-shadow:2px 2px 10px black;
}

/* SLIDER */
.slider {
  position:relative;
  max-width:900px;
  margin:20px auto;
  overflow:hidden;
  border-radius:10px;
}

.slides {
  display:flex;
  width:300%;
  animation:slide 12s infinite;
}

.slides img {
  width:100%;
}

@keyframes slide {
  0% {transform:translateX(0)}
  33% {transform:translateX(-100%)}
  66% {transform:translateX(-200%)}
  100% {transform:translateX(0)}
}

/* CONTAINER */
.container {max-width:900px;margin:auto;padding:20px}

/* CARD */
.card {
  background:#1e1e1e;
  padding:15px;
  margin:15px 0;
  border-radius:10px;
}

/* BUTTON */
.btn {
  padding:10px 15px;
  background:#00ffcc;
  color:black;
  border-radius:6px;
  text-decoration:none;
  font-weight:bold;
}

/* WHATSAPP FLOAT */
.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25D366;
  padding:15px;
  border-radius:50%;
  font-size:22px;
  color:white;
  text-decoration:none;
}

/* LANGUAGE */
.lang button {
  margin:5px;
  padding:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<header id="title">JENERAL GURUP 🏗️</header>

<!-- LANGUAGE -->
<div class="container lang">
  <button onclick="setLang('tr')">TR</button>
  <button onclick="setLang('pl')">PL</button>
  <button onclick="setLang('en')">EN</button>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slides">
    <img src="https://images.unsplash.com/photo-1590490360182-c33d57733427">
    <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c">
    <img src="https://images.unsplash.com/photo-1581092160607-ee22621dd758">
  </div>
</div>

<div class="container">

  <div class="card">
    <h2 id="about">Hakkımızda</h2>
    <p id="aboutText">
      İnşaat projeleri ve profesyonel yapı çözümleri sunuyoruz.
    </p>
  </div>

  <!-- GOOGLE MAPS -->
  <div class="card">
    <h2>📍 Konum</h2>
    <iframe
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d243647.499036!2d28.9784!3d41.0082"
      width="100%" height="250" style="border:0;">
    </iframe>
  </div>

  <!-- FORM (MAIL) -->
  <div class="card">
    <h2>📩 İletişim Formu</h2>

    <form action="https://formspree.io/f/your-id" method="POST">
      <input type="text" name="name" placeholder="Adınız" required><br><br>
      <input type="email" name="email" placeholder="Email" required><br><br>
      <textarea name="message" placeholder="Mesaj" required></textarea><br><br>
      <button class="btn">Gönder</button>
    </form>

  </div>

  <!-- CONTACT -->
  <div class="card">
    <h2>📞 İletişim</h2>
    <a class="btn" href="tel:+905551112233">Ara</a>
    <a class="btn" href="https://instagram.com">Instagram</a>
    <a class="btn" href="https://twitter.com">Twitter</a>
  </div>

</div>

<!-- WHATSAPP -->
<a class="whatsapp" href="https://wa.me/905551112233">💬</a>

<script>
function setLang(lang){
  if(lang==="tr"){
    document.getElementById("about").innerText="Hakkımızda";
    document.getElementById("aboutText").innerText="İnşaat projeleri ve profesyonel yapı çözümleri sunuyoruz.";
  }
  if(lang==="pl"){
    document.getElementById("about").innerText="O nas";
    document.getElementById("aboutText").innerText="Oferujemy profesjonalne projekty budowlane.";
  }
  if(lang==="en"){
    document.getElementById("about").innerText="About Us";
    document.getElementById("aboutText").innerText="We provide professional construction projects.";
  }
}
</script>

</body>
</html>
